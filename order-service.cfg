# Persist sequence numbers to disk so they survive a crash
FileStorePath=target/data/fix

# Timestamps to keep the session active across restarts
StartTime=00:00:00
EndTime=00:00:00
UseLocalTime=Y

# Resilience Settings (CRITICAL: Do NOT reset numbers on reconnect)
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N

[DEFAULT]
ConnectionType=acceptor
StartTime=00:00:00
EndTime=00:00:00
HeartBtInt=30
SenderCompID=EXEC_SERVER
TargetCompID=MINIFIX_CLIENT
UseDataDictionary=N
FileStorePath=store

[SESSION]
BeginString=FIX.4.4
SenderCompID=EXEC_SERVER
TargetCompID=MINIFIX_CLIENT
SocketAcceptPort=9876

# --- The Resilience Settings ---
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N